<!-- src/app/components/login/login.component.html -->
<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-content>
      <h1 class="login-title">Sign in to your account</h1>
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email address</mat-label>
        <input matInput type="email" [(ngModel)]="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" [ngModel]="password" (ngModelChange)="password = $event" />
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width signin-btn" (click)="loginRequest()">
        SIGN IN
      </button>

      <div *ngIf="response" class="response-message">
        {{ response }}
      </div>

      <div class="separator">
        <span>Other access methods:</span>
      </div>

      <button mat-stroked-button class="full-width decathlon-btn" (click)="loginWithDecathlon()">
        SIGN IN WITH DECATHLON
      </button>

      <div class="register-link">
        Don't have an account? <a routerLink="/register">Register</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
