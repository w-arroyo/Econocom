<div class="login-page">
  <div class="login-illustration">
    <div class="illustration-content">
      <img src="assets/images/login.svg" alt="Login Illustration" />
    </div>
  </div>

  <div class="login-panel">
    <mat-card class="login-card">
      <mat-card-content>
        <div class="logo-wrapper">
          <img src="assets/images/logos/Logo-RD.svg" alt="Logo" class="logo" />
        </div>

        <h1 class="login-title">Inicia sesión en tu cuenta</h1>

        <mat-form-field appearance="outline" class="full-width custom-field">
          <input
            matInput
            type="email"
            placeholder="Correo electrónico"
            [(ngModel)]="email"
          />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width custom-field">
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            placeholder="Contraseña"
            [ngModel]="password"
            (ngModelChange)="password = $event"
          />

          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          class="full-width signin-btn"
          (click)="loginRequest()"
        >
          ENTRAR
        </button>

        <div *ngIf="response" class="response-message">
          {{ response }}
        </div>

        <div class="separator">
          <span>Otras formas de acceso:</span>
        </div>

        <button
          mat-raised-button
          class="full-width decathlon-btn"
          (click)="loginWithDecathlon()"
        >
          ENTRAR CON DECATHLON
        </button>

        <div class="register-link">
          ¿No tienes cuenta?
          <a routerLink="/register">Regístrate</a>
        </div>

        <div class="footer">
  <div class="language-selector">
    <mat-icon>language</mat-icon>
    <span>IDIOMA: ES</span>
    <mat-icon class="arrow">expand_more</mat-icon>
  </div>

      <div class="footer-brand">
        <img
          src="assets/images/logos/Econocom.svg"
          alt="Econocom"
          class="econocom-logo"
        />
      </div>
      </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
